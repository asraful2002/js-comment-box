<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment List</title>

  <style>
    body {
  font-family: Arial;
  background: radial-gradient(circle at top, #606e8f, #020617);
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🔥 DARK GLASS CONTAINER */
.container {
  width: 90%;
  max-width: 500px;

  background: rgba(15, 23, 42, 0.65);
  backdrop-filter: blur(18px);

  padding: 20px;
  border-radius: 15px;

  border: 1px solid rgba(255, 255, 255, 0.08);

  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
}

/* title */
h2 {
  text-align: center;
  color: #e2e8f0;
}

/* textarea glass */
textarea {
  width: 100%;
  height: 100px;
  padding: 10px;

  resize: none;
  box-sizing: border-box;

  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.1);

  background: rgba(255, 255, 255, 0.05);
  color: #e2e8f0;

  outline: none;
}

textarea:focus {
  border-color: #6366f1;
}

/* 🔥 PREMIUM BUTTON */
button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;

  border: none;
  border-radius: 10px;

  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;

  cursor: pointer;
  font-weight: 500;
}

button:hover {
  opacity: 0.9;
  transform: scale(1.02);
}

/* list items glass */
ul {
  margin-top: 15px;
  padding-left: 0;
}

li {
  list-style: none;

  background: rgba(255, 255, 255, 0.06);
  color: #e2e8f0;

  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;

  word-break: break-word;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

/* mobile fix (same but better) */
@media (max-width: 480px) {
  .container {
    padding: 15px;
  }
}

  </style>
</head>
<body>

<div class="container">
  <h2>Comments</h2>

  <textarea id="commentInput" placeholder="Write a comment..."></textarea>
  <button id="addBtn">Add Comment</button>

  <ul id="commentList"></ul>
</div>

<script src="index.js"></script>

</body>
</html>
