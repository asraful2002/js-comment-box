<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment List</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      height: 100vh;

      /* center alignment */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      resize: none;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    ul {
      margin-top: 15px;
      padding-left: 20px;
    }

    li {
      background: #eee;
      margin-top: 8px;
      padding: 8px;
      border-radius: 5px;
      word-break: break-word;
    }

    /* mobile extra fix */
    @media (max-width: 200px) {
      .container {
        width: 95%;
        padding: 15px;
      }
    }

  </style>
</head>
<body>

<div class="container">
  <h2>Comments</h2>

  <textarea id="commentInput" placeholder="Write a comment..."></textarea>
  <button id="addBtn">Add Comment</button>

  <ul id="commentList"></ul>
</div>

<script src="index.js"></script>

</body>
</html>
