<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comment List</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    textarea {
      width: 100%;
      padding: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
    ul {
      margin-top: 15px;
      padding-left: 20px;
    }
    li {
      background: #eee;
      margin-top: 8px;
      padding: 8px;
      border-radius: 5px;
    }
  textarea, button {
  width: 100%;
  box-sizing: border-box; /* খুব important */
}

textarea {
  height: 100px;
  padding: 10px;
  resize: none;
}

button {
  padding: 10px;
  margin-top: 10px;
}
  </style>
</head>
<body>

<div class="container">
  <h2>Comments</h2>
  <textarea id="commentInput" placeholder="Write a comment..."></textarea>
  <button id="addBtn">Add Comment</button>
  <ul id="commentList"></ul>
</div>

<script src="index.js"></script>

</body>
</html>
