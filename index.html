<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment List</title>

  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 0;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #606e8f, #020617);
}


/* 🔥 CONTAINER */
.container {
  width: 90%;
  max-width: 500px;

  padding: 20px;
  border-radius: 15px;

  background: rgba(15, 23, 42, 0.65);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
}


/* TITLE */
h2 {
  text-align: center;
  color: #e2e8f0;
  margin-bottom: 15px;
}


/* TEXTAREA */
textarea {
  width: 100%;
  height: 100px;
  padding: 10px;

  resize: none;
  box-sizing: border-box;

  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.1);

  background: rgba(255, 255, 255, 0.05);
  color: #e2e8f0;

  outline: none;
}

textarea:focus {
  border-color: #6366f1;
}


/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;

  border: none;
  border-radius: 10px;

  background: linear-gradient(135deg, #6366f1, #ec4899);
  color: white;

  cursor: pointer;
  font-weight: 500;
  transition: 0.2s;
}

button:hover {
  opacity: 0.9;
  transform: scale(1.02);
}


/* LIST */
ul {
  margin-top: 15px;
  padding-left: 0;
}


/* LIST ITEM (🔥 FIXED WITH FLEX) */
li {
  list-style: none;

  display: flex;
  justify-content: space-between;
  align-items: center;

  gap: 10px;

  background: rgba(255, 255, 255, 0.06);
  color: #e2e8f0;

  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;

  border: 1px solid rgba(255, 255, 255, 0.05);
}



li span:first-child {
  word-break: break-word;
}
.delete-btn {
  flex-shrink: 0;

  width: 32px;
  height: 32px;

  display: flex;
  justify-content: center;
  align-items: center;

  border-radius: 50%;
  border: 2px solid #10b981;

  color: #10b981;
  cursor: pointer;

  font-size: 16px;
  transition: 0.2s;
}

.delete-btn:hover {
  background: #10b981;
  color: white;
}


/* MOBILE */
@media (max-width: 180px) {
  .container {
    padding: 15px;
  }
}
  </style>
</head>
<body>

<div class="container">
  <h2>Comments</h2>

  <textarea id="commentInput" placeholder="Write a comment..."></textarea>
  <button id="addBtn">Add Comment</button>

  <ul id="commentList"> </ul>
</div>

<script src="index.js"></script>

</body>
</html>
